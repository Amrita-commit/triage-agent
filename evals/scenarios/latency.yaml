# Latency fault scenarios: injected artificial latency on the demo app's endpoints.
- id: latency-checkout-3000
  faultType: latency
  endpoint: /faults/latency
  params: { ms: 3000 }
  drive: { path: /checkout, method: POST, count: 8 }
  alert: "P95 latency on checkout > 2s"
  expectedRootCause: "artificial latency injected in the checkout handler"
  expectedComponent: demo-app
  keywords: [latency, checkout]

