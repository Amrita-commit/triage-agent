spring:
  application:
    name: postmortem-agent

server:
  port: 8140

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}

copilot:
  model:
    cheap: ${COPILOT_MODEL_CHEAP:claude-haiku-4-5-20251001}
    planning: ${COPILOT_MODEL_PLANNING:claude-sonnet-5}

postmortem:
  output-dir: ${POSTMORTEM_OUTPUT_DIR:docs/incidents}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    dev.copilot: INFO
