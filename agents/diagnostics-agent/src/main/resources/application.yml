spring:
  application:
    name: diagnostics-agent

server:
  port: 8100

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}

copilot:
  model:
    cheap: ${COPILOT_MODEL_CHEAP:claude-haiku-4-5-20251001}
    planning: ${COPILOT_MODEL_PLANNING:claude-sonnet-5}

telemetry:
  mcp:
    sse-url: ${TELEMETRY_MCP_SSE_URL:http://localhost:8090/sse}

diagnostics:
  max-tool-calls: 15

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    dev.copilot: INFO
